<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programação Diária</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Resumo">
        <div class="brand-title">
          <img src="logo.jpg" alt="Hebert Engenharia" class="brand-logo" />
          <h1>Programação Diária</h1>
        </div>
        <section class="status-chart-panel top-status-chart" aria-label="Resumo por status">
          <div class="status-chart" id="statusChart" role="img" aria-label="Gráfico de pizza por status"></div>
          <div class="status-legend" id="statusLegend"></div>
        </section>
        <div class="summary-strip">
          <article>
            <span id="totalItems">0</span>
            <small>REGISTROS</small>
          </article>
          <article>
            <span id="todayItems">0</span>
            <small>HOJE</small>
          </article>
          <article>
            <span id="locationItems">0</span>
            <small>LOCAIS DE ATUAÇÃO HOJE</small>
          </article>
        </div>
      </section>

      <section class="workspace">
        <form id="scheduleForm" class="editor" autocomplete="off">
          <div class="form-head">
            <h2 id="formTitle">Novo registro</h2>
            <button type="button" id="clearForm" class="icon-button" aria-label="Limpar formulário" title="Limpar formulário">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18" />
                <path d="M8 6V4h8v2" />
                <path d="M19 6l-1 14H6L5 6" />
                <path d="M10 11v5" />
                <path d="M14 11v5" />
              </svg>
            </button>
          </div>

          <input type="hidden" id="recordId" />

          <label>
            <span>Data</span>
            <input id="data" name="data" type="date" required />
          </label>

          <label>
            <span>Período</span>
            <select id="periodo" name="periodo" required>
              <option value="">Selecione</option>
              <option>Diurno</option>
              <option>Noturno</option>
            </select>
          </label>

          <label>
            <span>Local</span>
            <input id="local" name="local" type="text" required />
          </label>

          <label>
            <span>Atividade</span>
            <textarea id="atividade" name="atividade" rows="4" required></textarea>
          </label>

          <label>
            <span>Responsável</span>
            <input id="responsavel" name="responsavel" type="text" required />
          </label>

          <label>
            <span>Equipe</span>
            <textarea id="equipe" name="equipe" rows="4"></textarea>
          </label>

          <div class="inline-fields">
            <label>
              <span>Status</span>
              <select id="status" name="status">
                <option value="">Selecione</option>
                <option>Concluído</option>
                <option>Pendente</option>
                <option>Andamento</option>
                <option>Cancelado</option>
              </select>
            </label>

            <label>
              <span>Data</span>
              <input id="dataStatus" name="dataStatus" type="date" />
            </label>
          </div>

          <button class="primary-action" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z" />
              <path d="M17 21v-8H7v8" />
              <path d="M7 3v5h8" />
            </svg>
            Salvar
          </button>
        </form>

        <section class="records-panel">
          <div class="toolbar">
            <div class="search-box">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21 21-4.3-4.3" />
                <circle cx="11" cy="11" r="7" />
              </svg>
              <input id="searchInput" type="search" placeholder="Buscar" />
            </div>
            <div class="toolbar-actions">
              <button type="button" id="shareWhatsApp" class="secondary-action">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M20 11.5a8 8 0 0 1-11.8 7L4 20l1.5-4.1A8 8 0 1 1 20 11.5Z" />
                  <path d="M9.5 8.5c.2-.5.4-.5.7-.5h.5c.2 0 .4.1.5.4l.7 1.6c.1.3.1.5-.1.7l-.4.5c.8 1.4 1.9 2.4 3.3 3.1l.6-.5c.2-.2.4-.2.7-.1l1.5.7c.3.1.4.3.4.6v.4c0 .4-.2.7-.6.9-.6.3-1.7.3-3.1-.4-2.3-1-4.1-2.8-5.1-5.1-.6-1.3-.6-2.4-.2-3Z" />
                </svg>
                WhatsApp
              </button>
              <button type="button" id="exportExcel" class="secondary-action">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" />
                  <path d="M14 2v6h6" />
                  <path d="m8 13 3 4" />
                  <path d="m11 13-3 4" />
                  <path d="M14 17h2" />
                  <path d="M14 13h2" />
                </svg>
                Excel
              </button>
            </div>
            <div id="exportStatus" class="export-status" aria-live="polite"></div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Data</th>
                  <th>Período</th>
                  <th>Local</th>
                  <th>Atividade</th>
                  <th>Responsável</th>
                  <th>Equipe</th>
                  <th>Status</th>
                  <th>Data</th>
                  <th aria-label="Ações"></th>
                </tr>
              </thead>
              <tbody id="recordsBody"></tbody>
            </table>
            <div id="emptyState" class="empty-state">
              <strong>Nenhum registro encontrado</strong>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js?v=mobile-wrap-17"></script>
  </body>
</html>
